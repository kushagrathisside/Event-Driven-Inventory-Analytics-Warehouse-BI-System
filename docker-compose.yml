x-proxy-env: &proxy-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  no_proxy: ${NO_PROXY:-}

x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${HTTP_PROXY:-}
  https_proxy: ${HTTPS_PROXY:-}
  no_proxy: ${NO_PROXY:-}

services:
  postgres:
    image: postgres:16
    container_name: medwarehouse-postgres
    restart: unless-stopped
    environment:
      <<: *proxy-env
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./:/workspace
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: medwarehouse-zookeeper
    restart: unless-stopped
    environment:
      <<: *proxy-env
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: medwarehouse-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      <<: *proxy-env
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        <<: *proxy-build-args
    container_name: medwarehouse-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *proxy-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow/project/src
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      MW_MASTER_DB_HOST: postgres
      MW_ANALYTICS_ADMIN_DB_HOST: postgres
      MW_ANALYTICS_WRITER_DB_HOST: postgres
      MW_ANALYTICS_READER_DB_HOST: postgres
      MW_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    # --username with --if-not-exists prevents failure on second run (Airflow 2.8+).
    command: >
      bash -lc "
      airflow db migrate &&
      airflow users create
      --username admin
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Med
      --lastname Warehouse
      --role Admin
      --email admin@example.com
      --if-not-exists
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        <<: *proxy-build-args
    container_name: medwarehouse-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *proxy-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow/project/src
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      MW_MASTER_DB_HOST: postgres
      MW_ANALYTICS_ADMIN_DB_HOST: postgres
      MW_ANALYTICS_WRITER_DB_HOST: postgres
      MW_ANALYTICS_READER_DB_HOST: postgres
      MW_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    # Port 8090 — avoids conflict with the medwarehouse-webapp on 8080.
    ports:
      - "8090:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        <<: *proxy-build-args
    container_name: medwarehouse-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *proxy-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow/project/src
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      MW_MASTER_DB_HOST: postgres
      MW_ANALYTICS_ADMIN_DB_HOST: postgres
      MW_ANALYTICS_WRITER_DB_HOST: postgres
      MW_ANALYTICS_READER_DB_HOST: postgres
      MW_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./:/opt/airflow/project
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  postgres_data:
  kafka_data:
  airflow_logs:
